{% extends "base.html" %}

{% block title %}Ticket Details{% endblock %}

{% block content %}

{% if ticket %}
    <h1>{{ ticket.title }}</h1>

    <p>Status: {{ ticket.status }}</p>
    <p>Description: {{ ticket.description }}</p>
{% else %}
    <h1>Ticket not found</h1>
{% endif %}

{% endblock %}
