{% extends "base.html" %}

{% block title %}Create Ticket{% endblock %}

{% block content %}

<h1>Create New Ticket</h1>

{% if error %}
    <p style="color: red;">{{ error }}</p>
{% endif %}

<form action="{{ url_for('tickets.create_ticket') }}" method="post">
    <input type="text" name="title" placeholder="Ticket title">

    <br><br>

    <textarea name="description" placeholder="Ticket description"></textarea>

    <br><br>

    <button type="submit">Create Ticket</button>
</form>

{% endblock %}
