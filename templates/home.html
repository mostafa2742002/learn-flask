{% extends "base.html" %}

{% block title %}Home{% endblock %}

{% block content %}

<h1>Hello, {{ name }}</h1>
<p>This data came from Flask.</p>

<h2>Tickets</h2>

<ul>
    {% for ticket in tickets %}
        <li>
            #{{ ticket.id }} - {{ ticket.title }} - {{ ticket.status }}

            <a href="{{ url_for('tickets.ticket_details', ticket_id=ticket.id) }}">View Details</a>
        </li>
    {% endfor %}
</ul>

{% endblock %}
