{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}

<h1>Create Account</h1>

<form action="{{ url_for('auth.register_route') }}" method="post">
    
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <input type="text" name="name" placeholder="Name" value="{{ name or '' }}">

    <br><br>

    <input type="email" name="email" placeholder="Email" value="{{ email or '' }}">

    <br><br>

    <input type="password" name="password" placeholder="Password" value="{{ password or '' }}">

    <br><br>

    <button type="submit">Register</button>
</form>

{% endblock %}
