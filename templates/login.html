{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}

<h1>Login</h1>

<form action="{{ url_for('auth.login_route') }}" method="post">
    <input type="email" name="email" placeholder="Email" value="{{ email or '' }}">

    <br><br>

    <input type="password" name="password" placeholder="Password" value="{{ password or '' }}">

    <br><br>

    <button type="submit">Login</button>
</form>

{% endblock %}
